<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mossèn Ramon, el millor del món</title>
    <link rel="icon" type="image/png" href="logo_colonies.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Contenidor del Comptador -->
    <div id="countdown-container">
        <h1>Mossèn Ramon, el millor del món</h1>
        <div id="timer">
            <span id="days">00</span>d 
            <span id="hours">00</span>h 
            <span id="minutes">00</span>m 
            <span id="seconds">00</span>s
        </div>
    </div>

    <!-- Contenidor del Vídeo (ocult per defecte) -->
    <div id="video-container" style="display: none;">
        <video id="myVideo" width="100%" controls>
            <source src="el-teu-video.mp4" type="video/mp4">
            El teu navegador no suporta vídeos.
        </video>
    </div>

    <script src="script.js"></script>
</body>
</html>

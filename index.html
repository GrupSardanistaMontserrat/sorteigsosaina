<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAN sorteig pel 50è Aniversari de Sosaina</title>
    <link rel="icon" type="image/png" href="logo_sosaina.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

    <div id="background-layer"></div>

    <main id="main-content">
        <img src="logo_sosaina.png" alt="Logo Sosaina" id="logo-sosaina">

        <h2>Celebrem i commemorem el nostre</h2>
        <h1>50è ANIVERSARI</h1>
        <h2 class="subtitle">El GRAN sorteig comença en...</h2>

        <div id="timer">
            <div class="time-block"><span id="days">00</span><p>Dies</p></div>
            <div class="time-block"><span id="hours">00</span><p>Hores</p></div>
            <div class="time-block"><span id="minutes">00</span><p>Minuts</p></div>
            <div class="time-block"><span id="seconds">00</span><p>Segons</p></div>
        </div>

        <h2 class="footer-text">7 de juny de 2026. 18h. No t'oblidis!</h2>
    </main>


    <script src="script.js"></script>
</body>
</html>

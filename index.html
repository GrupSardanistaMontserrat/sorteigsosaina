<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAN sorteig pel 50è Aniversari de Sosaina</title>
    <link rel="icon" type="image/png" href="logo_sosaina.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Afegim ?v=6 per forçar que es refresqui la memòria cau al servidor -->
    <link rel="stylesheet" href="style.css?v=6">
</head>
<body>

    <!-- FONS AMB LOGOS MARCA D'AIGUA -->
    <div id="background-layer"></div>

    <!-- CONTINGUT PRINCIPAL (EL COMPTE ENRERE) -->
    <main id="main-content">
        <img src="logo_sosaina.png" alt="Logo Sosaina" id="logo-sosaina">

        <h2>Celebrem i commemorem el nostre</h2>
        <h1>50è ANIVERSARI</h1>
        <h2 class="subtitle">El GRAN sorteig comença en...</h2>

        <div id="timer">
            <div class="time-block"><span id="days">00</span><p>Dies</p></div>
            <div class="time-block"><span id="hours">00</span><p>Hores</p></div>
            <div class="time-block"><span id="minutes">00</span><p>Minuts</p></div>
            <div class="time-block"><span id="seconds">00</span><p>Segons</p></div>
        </div>

        <h2 class="footer-text">7 de juny de 2026. 18h. No t'oblidis!</h2>
    </main>

    <!-- CONTENIDOR DEL VÍDEO (AMAGAT FINS A LES 18H) -->
    <div id="video-container" style="display: none;">
        
        <!-- NOU: Logo i títol que quedaran apilats just a sobre del vídeo -->
        <div id="video-overlay">
            <img src="logo_sosaina.png" alt="Logo Sosaina">
            <h1>50è ANIVERSARI</h1>
        </div>

        <!-- REPRODUCTOR DE YOUTUBE -->
        <iframe id="myVideo" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
